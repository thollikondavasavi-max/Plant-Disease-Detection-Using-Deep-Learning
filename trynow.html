<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plant Disease Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            color: #333;
            background: #0a3d0a;
            position: relative;
        }

        .background {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?auto=format&fit=crop&q=80') center/cover no-repeat;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 61, 10, 0.68);
            z-index: -1;
        }

        .header {
            background: #2e7d32;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            font-size: 1.25rem;
            font-weight: 500;
            position: relative;
            z-index: 10;
        }

        .back-arrow {
            font-size: 1.7rem;
            cursor: pointer;
        }

        .history-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            position: relative;
            z-index: 5;
        }

        @media (max-width:900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.94);
            border-radius: 16px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.16);
            padding: 24px 20px;
            text-align: center;
            height: fit-content;
        }

        .upload-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1b5e20;
            margin-bottom: 12px;
        }

        .upload-options {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            justify-content: center;
        }

        .option-btn {
            flex: 1;
            padding: 12px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .option-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .drop-zone {
            border: 2px dashed #81c784;
            border-radius: 12px;
            padding: 40px 20px;
            margin: 16px 0;
            cursor: pointer;
            transition: 0.25s;
            background: rgba(129, 199, 132, 0.06);
        }

        .drop-zone:hover {
            border-color: #4caf50;
            background: rgba(129, 199, 132, 0.14);
        }

        .leaf-icon {
            font-size: 3rem;
            color: #4caf50;
            margin-bottom: 12px;
        }

        .hidden-input {
            display: none;
        }

        #preview {
            max-width: 100%;
            max-height: 280px;
            border-radius: 12px;
            margin: 16px auto;
            display: none;
        }

        .detect-btn {
            background: #2e7d32;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.18rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 16px;
        }

        .detect-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .report-box {
            background: rgba(255, 255, 255, 0.94);
            border-radius: 16px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.16);
            padding: 28px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 85vh;
        }

        .report-title {
            color: #1b5e20;
            font-size: 1.6rem;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.94);
            padding-bottom: 10px;
            z-index: 10;
        }

        .report-loading {
            text-align: center;
            padding: 120px 20px;
            font-size: 1.3rem;
            color: #4caf50;
        }

        .report-content dl {
            line-height: 1.6;
            font-size: 1rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .report-content dt {
            font-weight: 700;
            color: #1b5e20;
            margin: 16px 0 6px;
            font-size: 1.05rem;
        }

        .report-content dd {
            margin-left: 0;
            color: #444;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .report-content pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .report-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .download-btn {
            background: #4caf50;
            color: white;
        }

        .download-btn:hover {
            background: #45a049;
        }

        .cancel-btn {
            background: #f44336;
            color: white;
        }

        .cancel-btn:hover {
            background: #da190b;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1b5e20;
            margin-bottom: 20px;
        }

        .report-list {
            list-style: none;
            padding: 0;
        }

        .report-item {
            padding: 12px;
            margin: 8px 0;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .report-item:hover {
            background: #e0e0e0;
        }

        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .close-modal:hover {
            color: #000;
        }

        #camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #camera-view {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 12px;
        }

        .camera-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .camera-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }

        .capture-btn {
            background: #4caf50;
            color: white;
        }

        .close-camera-btn {
            background: #f44336;
            color: white;
        }
    </style>
</head>

<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="header">
        <div class="back-arrow" onclick="history.back()">←</div>
        <span>Plant Disease Detection</span>
        <button class="history-btn" onclick="showReportHistory()" title="View Report History">📋</button>
    </div>

    <div class="container">
        <!-- Left: Upload -->
        <div class="upload-card">
            <div class="upload-title">Upload Leaf Image</div>

            <!-- Upload Options -->
            <div class="upload-options">
                <button class="option-btn" onclick="openCamera()">📷 Camera</button>
                <button class="option-btn" onclick="document.getElementById('file-input').click()">📁 Upload</button>
            </div>

            <div class="drop-zone" id="drop-zone">
                <div class="leaf-icon">🍃</div>
                <div>Click or drag & drop image here</div>
                <div style="margin-top:8px;color:#666;font-size:0.95rem;">JPG, PNG • max 5MB</div>
            </div>
            <input type="file" id="file-input" class="hidden-input" accept="image/*">
            <img id="preview" alt="Preview">

            <button class="detect-btn" id="detect-btn">Detect Disease</button>
        </div>

        <!-- Right: Report -->
        <div class="report-box" id="report-area">
            <div class="report-title">Analysis Result</div>
            <div id="report-loading" class="report-loading" style="display:none;">
                Analyzing your leaf… 🌿🔍
            </div>
            <div id="report-content" class="report-content" style="display:none;"></div>
            <div id="report-placeholder" style="color:#777; text-align:center; padding:140px 20px;">
                Upload an image and click "Detect Disease" to see results
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="camera-modal">
        <video id="camera-view" autoplay playsinline></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <div class="camera-controls">
            <button class="camera-btn capture-btn" onclick="capturePhoto()">📸 Capture</button>
            <button class="camera-btn close-camera-btn" onclick="closeCamera()">✕ Close</button>
        </div>
    </div>

    <!-- Report History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeHistoryModal()">×</span>
            <div class="modal-title">📋 Report History</div>
            <ul class="report-list" id="report-list"></ul>
        </div>
    </div>

    <!-- Download Options Modal -->
    <div id="download-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeDownloadModal()">×</span>
            <div class="modal-title">📥 Download Report</div>
            <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
                <button class="action-btn download-btn" onclick="downloadReport('txt')">📄 Download as Text</button>
                <button class="action-btn download-btn" onclick="downloadReport('json')">📋 Download as JSON</button>
                <button class="action-btn cancel-btn" onclick="closeDownloadModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentReportId = null;
        let cameraStream = null;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const detectBtn = document.getElementById('detect-btn');
        const loading = document.getElementById('report-loading');
        const content = document.getElementById('report-content');
        const placeholder = document.getElementById('report-placeholder');

        // Camera Functions
        async function openCamera() {
            try {
                const modal = document.getElementById('camera-modal');
                const video = document.getElementById('camera-view');

                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });

                video.srcObject = cameraStream;
                modal.style.display = 'flex';
            } catch (error) {
                console.error('Camera error:', error);
                alert('Unable to access camera. Please check permissions or use file upload.');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('camera-view');
            const canvas = document.getElementById('camera-canvas');
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                const file = new File([blob], 'camera-photo.jpg', { type: 'image/jpeg' });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;

                showPreview();
                closeCamera();

                setTimeout(() => detectBtn.click(), 500);
            }, 'image/jpeg', 0.9);
        }

        function closeCamera() {
            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('camera-view');

            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }

            video.srcObject = null;
            modal.style.display = 'none';
        }

        // Report History Functions
        async function showReportHistory() {
            try {
                const res = await fetch('/get-reports');
                const data = await res.json();

                const reportList = document.getElementById('report-list');
                reportList.innerHTML = '';

                if (data.reports.length === 0) {
                    reportList.innerHTML = '<li style="text-align:center;padding:20px;color:#666;">No reports yet</li>';
                } else {
                    data.reports.reverse().forEach(report => {
                        const li = document.createElement('li');
                        li.className = 'report-item';
                        li.innerHTML = `
                            <div style="font-weight:600;">${report.title}</div>
                            <div style="font-size:0.9rem;color:#666;margin-top:4px;">${report.timestamp}</div>
                        `;
                        li.onclick = () => loadReport(report.id);
                        reportList.appendChild(li);
                    });
                }

                document.getElementById('history-modal').style.display = 'flex';
            } catch (error) {
                console.error('Error loading reports:', error);
                alert('Failed to load report history');
            }
        }

        async function loadReport(reportId) {
            try {
                const res = await fetch(`/get-report/${reportId}`);
                const data = await res.json();

                if (data.status === 'success') {
                    currentReportId = reportId;
                    displayReport(data.report);
                    closeHistoryModal();
                }
            } catch (error) {
                console.error('Error loading report:', error);
                alert('Failed to load report');
            }
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').style.display = 'none';
        }

        // Download Functions
        function showDownloadModal() {
            if (!currentReportId) {
                alert('No report to download');
                return;
            }
            document.getElementById('download-modal').style.display = 'flex';
        }

        function closeDownloadModal() {
            document.getElementById('download-modal').style.display = 'none';
        }

        function downloadReport(format) {
            if (!currentReportId) {
                alert('No report to download');
                return;
            }
            window.location.href = `/download-report/${currentReportId}/${format}`;
            closeDownloadModal();
        }

        function displayReport(r) {
            let html = `
                <dl>
                    <dt>Condition</dt><dd>${r.condition}</dd>
                    <dt>Disease</dt><dd>${r.disease}</dd>
                    <dt>Confidence</dt><dd>${r.confidence}</dd>
                    <dt>Symptoms</dt><dd><pre style="margin:0; font-family:inherit;">${r.symptoms}</pre></dd>
                    <dt>Possible Causes</dt><dd><pre style="margin:0; font-family:inherit;">${r.causes}</pre></dd>
                    <dt>Treatment</dt><dd><pre style="margin:0; font-family:inherit;">${r.treatment}</pre></dd>
                    <dt>Prevention</dt><dd><pre style="margin:0; font-family:inherit;">${r.prevention}</pre></dd>
                    <dt>Weather Suggestion</dt><dd>${r.weather}</dd>
                </dl>
            `;

            if (r.note) {
                html += `<div style="background:#fff3cd;border:1px solid #ffeaa7;border-radius:8px;padding:12px;margin-top:16px;color:#856404;">
                    <strong>💡 Note:</strong> ${r.note}
                </div>`;
            }

            html += `
                <div class="report-actions">
                    <button class="action-btn download-btn" onclick="showDownloadModal()">📥 Download</button>
                    <button class="action-btn cancel-btn" onclick="cancelReport()">✕ Cancel</button>
                    <button class="action-btn" onclick="deleteCurrentReport()" style="background: #ff9800; color: white;">🗑️ Delete</button>
                </div>
            `;

            content.innerHTML = html;
            placeholder.style.display = 'none';
            loading.style.display = 'none';
            content.style.display = 'block';
        }

        async function deleteCurrentReport() {
            if (!currentReportId) {
                alert('No report to delete');
                return;
            }

            if (!confirm('Are you sure you want to delete this report?')) {
                return;
            }

            try {
                const res = await fetch(`/delete-report/${currentReportId}`, {
                    method: 'POST'
                });

                const data = await res.json();

                if (data.status === 'success') {
                    alert('Report deleted successfully');
                    cancelReport();
                } else {
                    alert('Failed to delete report');
                }
            } catch (error) {
                console.error('Error deleting report:', error);
                alert('Failed to delete report');
            }
        }

        function cancelReport() {
            content.style.display = 'none';
            placeholder.style.display = 'block';
            currentReportId = null;
        }

        // File Upload Functions
        function showPreview() {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                dropZone.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', showPreview);

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.style.borderColor = '#4caf50';
            dropZone.style.background = 'rgba(76,175,80,0.18)';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#81c784';
            dropZone.style.background = 'rgba(129,199,132,0.06)';
        });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.style.borderColor = '#81c784';
            dropZone.style.background = 'rgba(129,199,132,0.06)';
            if (e.dataTransfer.files[0]?.type.startsWith('image/')) {
                fileInput.files = e.dataTransfer.files;
                showPreview();
            }
        });

        // Detect Disease
        detectBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) {
                alert("Please select an image first");
                return;
            }

            detectBtn.disabled = true;
            placeholder.style.display = 'none';
            loading.style.display = 'block';
            content.style.display = 'none';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }

                const data = await res.json();

                if (data.status !== 'success') {
                    throw new Error(data.error || 'Analysis failed');
                }

                currentReportId = data.report_id;
                displayReport(data.report);

            } catch (err) {
                console.error('Detection error:', err);
                content.innerHTML = `<p style='color:#c62828;text-align:center;padding:80px 20px;'>Analysis failed: ${err.message}<br><br>Please try again.</p>`;
                loading.style.display = 'none';
                content.style.display = 'block';
            } finally {
                detectBtn.disabled = false;
            }
        });

        // Check for captured image from index page
        window.addEventListener('load', () => {
            const capturedImage = sessionStorage.getItem('capturedImage');
            if (capturedImage) {
                fetch(capturedImage)
                    .then(res => res.blob())
                    .then(blob => {
                        const file = new File([blob], 'captured-photo.jpg', { type: 'image/jpeg' });
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        fileInput.files = dataTransfer.files;

                        preview.src = capturedImage;
                        preview.style.display = 'block';
                        dropZone.style.display = 'none';

                        sessionStorage.removeItem('capturedImage');
                        setTimeout(() => detectBtn.click(), 500);
                    });
            }

            // Check if coming from "Get Final Report" link
            if (window.location.hash === '#history') {
                setTimeout(() => showReportHistory(), 500);
            }
        });
    </script>
</body>

</html>
